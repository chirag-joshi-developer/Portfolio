services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-portfolio}
      MYSQL_USER: ${MYSQL_USER:-portfolio_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-portfolio_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    # Bound to VPS localhost only — use SSH tunnel from HeidiSQL; not exposed to the internet.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - path: .env.production
        required: false
      - path: .env
        required: false
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env.production}
      DEBUG: ${DEBUG:-0}
      # Default 0 for HTTP/IP phase. Set IS_PRODUCTION=1 only behind TLS.
      IS_PRODUCTION: ${IS_PRODUCTION:-0}
      DATABASE_URL: ${DATABASE_URL:-mysql://portfolio_user:portfolio_password@mysql:3306/portfolio}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-chirag}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-chirag@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:?Set DJANGO_SUPERUSER_PASSWORD in .env.production}
    volumes:
      # Same bind mounts as local so you can edit code live on the server.
      - ./backend:/app
      - backend_media:/app/media
    # Not published to the host — nginx is the only public entrypoint.
    expose:
      - "8000"

    command:
      - /bin/sh
      - -c
      - |
        set -e
        python manage.py migrate
        python manage.py collectstatic --noinput
        python manage.py create_superuser_from_env
        exec gunicorn config.wsgi:application \
          --bind=0.0.0.0:8000 \
          --workers=${GUNICORN_WORKERS:-3} \
          --timeout=${GUNICORN_TIMEOUT:-60} \
          --access-logfile=- \
          --error-logfile=-

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Same-origin via nginx; leave empty unless the API is on another host.
      VITE_API_URL: ${VITE_API_URL:-}
    volumes:
      # Same bind mounts as local so you can edit the frontend live on the server.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "3000"
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  backend_media:
  frontend_node_modules:
